<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4e - Maths avec Cécile</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at 8% 20%,rgba(255,92,180,.28),transparent 24%),
    radial-gradient(circle at 85% 18%,rgba(95,170,255,.25),transparent 25%),
    radial-gradient(circle at 80% 75%,rgba(77,230,185,.22),transparent 30%),
    linear-gradient(135deg,#ffe2f4,#f0ddff,#dff6ff,#e4ffe9);
    min-height:100vh;
}

header{
    background:white;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

header h1{
    color:#2738c9;
    font-size:42px;
}

.container{
    max-width:1100px;
    margin:50px auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card{
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:90px;
    margin-bottom:20px;
}

.card h2{
    font-size:36px;
    color:#00a99d;
    margin-bottom:15px;
}

.card p{
    font-size:20px;
    line-height:1.5;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:16px 35px;
    border-radius:999px;
    background:linear-gradient(135deg,#18dbc8,#00a99d);
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

.disabled{
    opacity:.45;
}

.disabled .btn{
    background:#bdbdbd;
    pointer-events:none;
}

.retour{
    display:block;
    width:260px;
    margin:50px auto;
    text-align:center;
    text-decoration:none;
    background:linear-gradient(135deg,#ff4fa3,#3058ff);
    color:white;
    padding:18px;
    border-radius:999px;
    font-size:20px;
    font-weight:bold;
}

</style>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-DPZBQER45B');
</script>
</head>

<body>

<header>
<h1>📚 Niveau 5e</h1>
</header>

<div class="container">

<div class="cards">
</div>

<a class="retour" href="index.html">
← Retour à l'accueil
</a>

</div>

</body>
</html>
