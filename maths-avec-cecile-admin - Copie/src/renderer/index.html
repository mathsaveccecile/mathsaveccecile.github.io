<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Maths avec Cécile - Admin</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <h1>Maths avec Cécile</h1>
      <button id="newCapsuleBtn">📚 Nouvelle capsule</button>
      <button id="openCapsuleBtn">📂 Ouvrir</button>
      <button id="saveCapsuleBtn">💾 Enregistrer</button>
    </aside>

    <main class="main">
      <h2>Administration des capsules</h2>

      <section class="card">
        <label>Nom de la capsule</label>
        <input id="capsuleTitle" placeholder="Ex : Pythagore" />

        <label>Niveau</label>
        <input id="capsuleLevel" placeholder="Ex : 4e / 3e" />

        <label>Durée</label>
        <input id="capsuleDuration" placeholder="Ex : 18 min" />
      </section>

      <section class="card">
        <h3>Ajouter un élément</h3>
        <button id="addImageBtn">🖼 Ajouter une image</button>
        <button id="addVideoBtn">🎥 Ajouter une vidéo</button>
        <button id="addPdfBtn">📄 Ajouter un PDF</button>
        <button id="addQuizBtn">❓ Ajouter un quiz</button>
      </section>

      <section class="card">
        <h3>Contenu de la capsule</h3>
        <div id="stepsList"></div>
      </section>
    </main>
  </div>

  <script src="./src/renderer.js"></script>
</body>
</html>
