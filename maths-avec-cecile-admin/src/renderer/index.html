<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Maths avec Cécile - Admin</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <h1>Maths avec Cécile</h1>
      <button id="newCapsuleBtn">📚 Nouvelle capsule</button>
      <button id="openCapsuleBtn">📂 Ouvrir</button>
      <button id="importSiteBtn" class="menuButton">
  📥 Importer depuis le site
</button>
      <button id="saveCapsuleBtn">💾 Enregistrer</button>
      <button id="saveProjectBtn" class="menuButton">
  📁 Enregistrer le projet
</button>
      <button id="previewCapsuleBtn" class="menuButton">
    👁️ Prévisualiser
    </button>
    <button id="exportSiteBtn" class="menuButton">
  🚀 Exporter site
</button>

    </aside>

    <main class="main">
      <h2>Administration des capsules</h2>

      <section class="card">
        <label>Nom de la capsule</label>
        <input id="capsuleTitle" placeholder="Ex : Pythagore" />

<label>Niveaux</label>

<div class="levels-box">
  <label><input type="checkbox" class="levelCheck" value="6e"> 6e</label><br>
  <label><input type="checkbox" class="levelCheck" value="5e"> 5e</label><br>
  <label><input type="checkbox" class="levelCheck" value="4e"> 4e</label><br>
  <label><input type="checkbox" class="levelCheck" value="3e"> 3e</label>
</div>

<br>
      
      <div class="step">
  <h3>🖼️ Vignette de la capsule</h3>
  <button id="chooseThumbnailBtn">Choisir une vignette</button>
  <div id="thumbnailPreview"></div>
</div>
      </section>

      <section class="card">
        <h3>Ajouter un élément</h3>
        <button id="addImageBtn">🖼 Ajouter une image</button>
        <button id="addVideoBtn">🎥 Ajouter une vidéo</button>
        <button id="addPdfBtn">📄 Ajouter un PDF</button>
        <button id="addQuizBtn">❓ Ajouter un quiz</button>
        <button id="addOpenQuizBtn">✍️ Question ouverte</button>
<button id="addTrueFalseQuizBtn">✅❌ Vrai / Faux</button>
<button id="addMatchingQuizBtn">🔗 Associer les paires</button>
      </section>

      <section class="card">
        <h3>Contenu de la capsule</h3>
        <div id="stepsList"></div>
      </section>
    </main>
  </div>

  <script src="./src/renderer.js"></script>
</body>
</html>
