<script>
const params = new URLSearchParams(location.search);
const dataFile = params.get("data");

let currentStep = 0;
let userIsConnected = false;

if(!dataFile){
  document.getElementById("content").innerHTML = "<h2>❌ Aucune capsule indiquée.</h2>";
}else{
  const script = document.createElement("script");
  script.src = dataFile + "?v=" + Date.now();
  script.onload = startCapsule;
  script.onerror = () => {
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger le fichier de la capsule.</h2>";
  };
  document.head.appendChild(script);
}

function openComments(event){
  event.preventDefault();

  if(!userIsConnected){
    alert("🔐 Tu dois être connecté pour laisser un commentaire ou poser une question.");
    openLoginModal();
    return;
  }

  const url =
    "avis.html?capsule=" +
    encodeURIComponent(capsuleData.title) +
    "&retour=" +
    encodeURIComponent(location.href);

  location.href = url;
}

function startCapsule(){
  if(typeof capsuleData === "undefined"){
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger la capsule.</h2>";
    return;
  }

  if(!Array.isArray(capsuleData.levels)){
    capsuleData.levels = capsuleData.level ? [capsuleData.level] : [];
  }

  if(!Array.isArray(capsuleData.steps)){
    capsuleData.steps = [];
  }

  document.title = capsuleData.title + " - Maths avec Cécile";
  document.getElementById("title").textContent = capsuleData.title;
const avisUrl =
  "avis.html?capsule=" +
  encodeURIComponent(capsuleData.title) +
  "&retour=" +
  encodeURIComponent(location.href);

const avisLink = document.getElementById("avisLink");
if(avisLink){
  avisLink.href = avisUrl;
}

const avisMobile = document.getElementById("avisMobile");
if(avisMobile){
  avisMobile.href = avisUrl;
}

  const backHref = capsuleData.levels.length ? capsuleData.levels[0] + ".html" : "index.html";
  document.getElementById("backLink").href = backHref;
  const mobileBackLink = document.getElementById("mobileBackLink");
  if(mobileBackLink) mobileBackLink.href = backHref;

  updateStats();
  checkConnection();
}
function icon(step){
    if(step.type === "video") return "▶️";
    if(step.type === "image") return "🖼️";
    if(step.type === "pdf") return "📄";

    if(step.type === "quiz"){
        if(step.quizType === "qcm") return "📝";
        if(step.quizType === "open") return "✍️";
        if(step.quizType === "matching") return "🔗";
        if(step.quizType === "trueFalse") return "✅❌";
    }

    return "📌";
}

function youtubeEmbed(url){
  if(!url) return "";

  let videoId = "";

  if(url.includes("youtube.com/shorts/")){
    videoId = url.split("/shorts/")[1].split("?")[0];
  } else if(url.includes("youtu.be/")){
    videoId = url.split("youtu.be/")[1].split("?")[0];
  } else if(url.includes("watch?v=")){
    videoId = url.split("watch?v=")[1].split("&")[0];
  } else if(url.includes("youtube.com/embed/")){
    videoId = url.split("/embed/")[1].split("?")[0];
  } else {
    return url;
  }

  return "https://www.youtube-nocookie.com/embed/" +
    videoId +
    "?playsinline=1&iv_load_policy=3";
}

function formatDuration(seconds){
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;

  if(seconds === 0) return "0 min";
  if(min === 0) return sec + " s";
  if(sec === 0) return min + " min";
  return min + " min " + sec + " s";
}

function getTotalDuration(){
  let total = 0;

  capsuleData.steps.forEach(step => {
    if (step.type === "image") {
      total += 20;
    }

    if (step.type === "quiz") {
      total += 60;
    }

    if (step.type === "video") {
      total += Number(step.duration || 0);
    }

    if (step.type === "pdf") {
      total += 0;
    }
  });

  return total;
}

function updateStats(){
  const videos = capsuleData.steps.filter(s => s.type === "video").length;
  const images = capsuleData.steps.filter(s => s.type === "image").length;
  const quiz = capsuleData.steps.filter(s => s.type === "quiz").length;
  const pdfPages = capsuleData.steps
  .filter(step => step.type === "pdf")
  .reduce((total, step) => total + Number(step.pages || 1), 0);

  document.getElementById("badges").innerHTML = `
    <span style="background:#e9f8ee;color:#111;">
      ⏱️ ${formatDuration(getTotalDuration())}
    </span>

    <span style="background:#e9f8ee;color:#111;">
      📹 ${videos} ${videos > 1 ? "vidéos" : "vidéo"}
    </span>

    <span style="background:#e9f8ee;color:#111;">
      🖼️ ${images} ${images > 1 ? "images" : "image"}
    </span>

    <span style="background:#e9f8ee;color:#111;">
      ❓ ${quiz} QUIZ
    </span>

    <span style="background:#e9f8ee;color:#111;">
  📄 Résumé de cours (${pdfPages} ${pdfPages > 1 ? "fiches" : "fiche"})
</span>
  `;
}

function renderSteps(){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";

  capsuleData.steps.forEach((step,index)=>{
    const div = document.createElement("div");
    div.className = "step" + (index === currentStep ? " active" : "");

    div.onclick = async () => {
  currentStep = index;
  await saveProgress();
  closeMenu();
  render();
  scrollToContentTop();
};

    const titre =
      step.type === "quiz"
        ? (
            step.quizType === "qcm" ? "QCM" :
            step.quizType === "trueFalse" ? "Vrai / Faux" :
            step.quizType === "matching" ? "Associer les paires" :
            step.quizType === "open" ? "Question ouverte" :
            "Quiz"
          )
        : (step.title || "Étape");

    div.innerHTML = `
      <div><span class="num">${index + 1}</span> ${titre}</div>
      <div>${icon(step)}</div>
    `;

    list.appendChild(div);
  });
}

function renderContent(){
  const content = document.getElementById("content");

  if(!capsuleData.steps.length){
    document.getElementById("stepTitle").textContent = "";
    content.innerHTML = "<h2>Cette capsule ne contient pas encore d'élément.</h2>";
    return;
  }

  const step = capsuleData.steps[currentStep];
  document.getElementById("stepTitle").textContent = 
    step.type === "quiz" && step.quizType === "qcm" ? "QCM" : (step.title || "Étape");

  if(step.type === "image"){
    content.innerHTML = `<img src="${step.src}" alt="${step.title || "Image"}">`;
  }

  if(step.type === "video"){
    content.innerHTML = step.src ? `
      <div style="display:flex;justify-content:center;">
        <iframe 
          src="${youtubeEmbed(step.src)}"
          width="360"
          height="640"
          frameborder="0"
          allowfullscreen
          style="border-radius:24px;max-width:100%;">
        </iframe>
      </div>
    ` : "🎥 Emplacement de la vidéo";
  }

 if(step.type === "pdf"){
  const pdfTitle = step.title || "Fiche PDF";

  if(step.loginRequired && !userIsConnected){
    content.innerHTML = `
      <div style="padding:40px;">
        <h2>🔒 ${pdfTitle}</h2>
        <p>Connecte-toi pour voir et télécharger ce PDF.</p>
        <button class="pdf-btn" onclick="openLoginModal()">🔐 Se connecter</button>
        <br><br>
        <button class="pdf-btn" onclick="openSignupModal()">✨ Créer un compte</button>
      </div>
    `;
  } else {
    content.innerHTML = `
      <div class="pdfMobileBox">
        <h2>📄 ${pdfTitle}</h2>

        <p style="font-size:18px;line-height:1.5;">
          Pour lire le PDF confortablement sur téléphone, ouvre-le en plein écran.
        </p>

        
        <button class="pdf-btn" onclick="openPdfFullscreen('${step.src.replace(/'/g, "\\'")}')">
  📖 Ouvrir le PDF en plein écran

function checkOpenAnswer(){
  const step = capsuleData.steps[currentStep];
  const textarea = document.getElementById("openAnswer");
  const answer = textarea.value;
  const expected = step.correction || "";

  function clean(text){
    return String(text || "")
      .replace(/[.,;:!?]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function normal(text){
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[’]/g, "'")
      .replace(/[.,;:!?]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function sansArticle(text){
    return normal(text)
      .replace(/^(le|la|les|un|une|des)\s+/i, "")
      .replace(/^l'/i, "")
      .trim();
  }

  const answerClean = clean(answer);
  const expectedClean = clean(expected);

  const expectedIsOneLetter = /^[A-Z]$/.test(expectedClean);

  if(expectedIsOneLetter){
    if(answerClean === expectedClean){
      textarea.style.border = "3px solid #5cff8d";
      textarea.style.background = "#effff4";
      showFeedback(true);
    } else {
      textarea.style.border = "3px solid #ff6b6b";
      textarea.style.background = "#fff2f2";
      showFeedback(false);
    }
    return;
  }

  if(normal(answer) === normal(expected)){
    textarea.style.border = "3px solid #5cff8d";
    textarea.style.background = "#effff4";
    showFeedback(true);
    return;
  }

  if(sansArticle(answer) === sansArticle(expected)){
    textarea.style.border = "3px solid #ffd85c";
    textarea.style.background = "#fff9df";

    const feedback = document.getElementById("feedback");
    if(feedback){
      feedback.innerHTML = "🟡 Presque ! Il manque l’article dans ta réponse.";
      feedback.style.marginTop = "25px";
      feedback.style.fontSize = "22px";
      feedback.style.fontWeight = "900";
      feedback.style.color = "#ffd85c";
    }
    scrollToFeedback();
    return;
  }

  textarea.style.border = "3px solid #ff6b6b";
  textarea.style.background = "#fff2f2";
  showFeedback(false);
}

let touchStartX = 0;
let touchStartY = 0;

function initSwipeNavigation(){
  const zone = document.getElementById("content");
  if(!zone) return;

  zone.addEventListener("touchstart", (e) => {
    const target = e.target.closest("button, a, input, textarea, select, iframe");
    if(target) return;
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive:true});

  zone.addEventListener("touchend", async (e) => {
    if(!touchStartX) return;

    const target = e.target.closest("button, a, input, textarea, select, iframe");
    if(target) return;

    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;

    touchStartX = 0;
    touchStartY = 0;

    if(Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy)) return;

    if(dx < 0){
      await nextStep();
    }else{
      await previousStep();
    }
  }, {passive:true});
}

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  await supabaseClient
  .from("progressions")
  .delete()
  .eq("user_id", sessionData.session.user.id)
  .eq("capsule", capsuleData.title);

  currentStep = 0;
  render();

  alert("La capsule a été remise à zéro !");
}

async function logoutStudent(){
  await supabaseClient.auth.signOut();
  localStorage.removeItem("studentConnected");
  alert("Tu es déconnecté.");
  location.reload();
}

function getStepDuration(step){
  if(step.type === "image") return 20;
  if(step.type === "quiz") return 60;
  if(step.type === "video") return Number(step.duration || 0);
  if(step.type === "pdf") return 0;
  return 0;
}

function getTimeProgressPercent(){
  const total = capsuleData.steps.reduce((sum, step) => sum + getStepDuration(step), 0);
  if(total === 0) return 0;

  let done = 0;

  for(let i = 0; i <= currentStep; i++){
    done += getStepDuration(capsuleData.steps[i]);
  }

  return Math.min(100, Math.round((done / total) * 100));
}

async function likeCapsule(){
  const { data: sessionData } = await supabaseClient.auth.getSession();

  if(!sessionData.session){
    openLoginModal();
    return;
  }

  const user = sessionData.session.user;

  const { error } = await supabaseClient
    .from("likes")
    .insert({
      user_id: user.id,
      capsule: capsuleData.title
    });

  if(error){
    alert("Tu as peut-être déjà mis un like.");
    return;
  }

  showLikeAnimation();
  renderLikeButton();
}

function showLikeAnimation(){
  const anim = document.createElement("div");
  anim.id = "likeAnimation";

  let hearts = "";
  for(let i = 0; i < 28; i++){
    const left = Math.floor(Math.random() * 100);
    const delay = (Math.random() * 0.9).toFixed(2);
    const size = 22 + Math.floor(Math.random() * 20);
    const heart = ["💚","💜","💖","💕","💗"][Math.floor(Math.random() * 5)];

    hearts += `
      <div class="rainHeart"
        style="left:${left}%;animation-delay:${delay}s;font-size:${size}px;">
        ${heart}
      </div>
    `;
  }

  anim.innerHTML = `
    ${hearts}
    <div class="likePop">
      <img src="avatar-cecile.png">
      <h2>Merci beaucoup !</h2>
      <p>Grâce à ton Like, tu m'encourages à créer encore plus de capsules gratuites.</p>
    </div>
  `;

  document.body.appendChild(anim);

  setTimeout(() => {
    anim.remove();
  }, 3200);
}
async function saveProgress(){
  if(!userIsConnected || !capsuleData.steps.length) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const percent = getTimeProgressPercent();

  const { data } = await supabaseClient
    .from("progressions")
    .select("id")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .maybeSingle();

  if(data){
    await supabaseClient
      .from("progressions")
      .update({ current_step: currentStep, percent: percent })
      .eq("id", data.id);
  }else{
    await supabaseClient
      .from("progressions")
      .insert({
        user_id: sessionData.session.user.id,
        capsule: capsuleData.title,
        current_step: currentStep,
        percent: percent
      });
  }
}

async function loadProgress(){
  if(!userIsConnected) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const { data, error } = await supabaseClient
    .from("progressions")
    .select("current_step, percent, updated_at")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .order("updated_at", { ascending: false })
    .limit(1);

  if(error){
    console.log(error);
    return;
  }

  if(data && data.length > 0){
    currentStep = Number(data[0].current_step || 0);
  }
}

function openPdfFullscreen(pdfSrc){
  try{
    if(pdfSrc.startsWith("data:application/pdf;base64,")){
      const base64 = pdfSrc.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for(let i = 0; i < binary.length; i++){
        bytes[i] = binary.charCodeAt(i);
      }

      const blob = new Blob([bytes], { type: "application/pdf" });
      const blobUrl = URL.createObjectURL(blob);

      window.open(blobUrl, "_blank");

      setTimeout(() => {
        URL.revokeObjectURL(blobUrl);
      }, 60000);
    }else{
      window.open(pdfSrc, "_blank");
    }
  }catch(error){
    console.error("Erreur lors de l'ouverture du PDF :", error);
    alert("Impossible d'ouvrir le PDF en plein écran. Tu peux toujours le télécharger.");
  }
}
