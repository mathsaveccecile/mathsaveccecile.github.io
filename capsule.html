<script>
const params = new URLSearchParams(location.search);
const dataFile = params.get("data");

let currentStep = 0;
let userIsConnected = false;

if(!dataFile){
  document.getElementById("content").innerHTML = "<h2>❌ Aucune capsule indiquée.</h2>";
}else{
  const script = document.createElement("script");
  script.src = dataFile + "?v=" + Date.now();
  script.onload = startCapsule;
  script.onerror = () => {
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger le fichier de la capsule.</h2>";
  };
  document.head.appendChild(script);
}

function startCapsule(){
  if(typeof capsuleData === "undefined"){
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger la capsule.</h2>";
    return;
  }

  if(!Array.isArray(capsuleData.levels)){
    capsuleData.levels = capsuleData.level ? [capsuleData.level] : [];
  }

  if(!Array.isArray(capsuleData.steps)){
    capsuleData.steps = [];
  }

  document.title = capsuleData.title + " - Maths avec Cécile";
  document.getElementById("title").textContent = capsuleData.title;

  document.getElementById("avisLink").href =
    "avis.html?capsule=" + encodeURIComponent(capsuleData.title);

  document.getElementById("backLink").href =
    capsuleData.levels.length ? capsuleData.levels[0] + ".html" : "index.html";

  updateStats();
  checkConnection();
}

function icon(step){
  if(step.type === "video") return "🎥";
  if(step.type === "image") return "🖼️";
  if(step.type === "pdf") return "📄";

  if(step.type === "quiz"){
    if(step.quizType === "QCM") return "❓";
    if(step.quizType === "open") return "✍️";
    if(step.quizType === "matching") return "🔗";
    if(step.quizType === "trueFalse") return "✅❌";
  }

  return "⭐";
}

function youtubeEmbed(url){
  if(!url) return "";

  if(url.includes("youtube.com/shorts/")){
    const id = url.split("/shorts/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  if(url.includes("youtu.be/")){
    const id = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  if(url.includes("watch?v=")){
    const id = url.split("watch?v=")[1].split("&")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  return url;
}

function formatDuration(seconds){
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;

  if(seconds === 0) return "0 min";
  if(min === 0) return sec + " s";
  if(sec === 0) return min + " min";
  return min + " min " + sec + " s";
}

function getTotalDuration(){
  let total = 0;

  capsuleData.steps.forEach(step => {
    if (step.type === "image") {
      total += 20;
    }

    if (step.type === "quiz") {
      total += 60;
    }

    if (step.type === "video") {
      total += Number(step.duration || 0);
    }

    if (step.type === "pdf") {
      total += 0;
    }
  });

  return total;
}

function updateStats(){
  const videos = capsuleData.steps.filter(s => s.type === "video").length;
  const images = capsuleData.steps.filter(s => s.type === "image").length;
  const quiz = capsuleData.steps.filter(s => s.type === "quiz").length;
  const pdf = capsuleData.steps.filter(s => s.type === "pdf").length;

  document.getElementById("badges").innerHTML = `
    <span>⏱️ ${formatDuration(getTotalDuration())}</span>
    <span>🎥 ${videos} ${videos > 1 ? "vidéos" : "vidéo"}</span>
    <span>🖼️ ${images} ${images > 1 ? "images" : "image"}</span>
    <span>❓ ${quiz} QUIZ</span>
    <span>📄 ${pdf} ${pdf > 1 ? "fiches" : "fiche"}</span>
  `;
}

function renderSteps(){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";

  capsuleData.steps.forEach((step,index)=>{
    const div = document.createElement("div");
    div.className = "step" + (index === currentStep ? " active" : "");

    div.onclick = async () => {
      currentStep = index;
      await saveProgress();
      render();
    };

    const titre =
      step.type === "quiz"
        ? (
            step.quizType === "qcm" ? "QCM" :
            step.quizType === "trueFalse" ? "Vrai / Faux" :
            step.quizType === "matching" ? "Associer les paires" :
            step.quizType === "open" ? "Question ouverte" :
            "Quiz"
          )
        : (step.title || "Étape");

    div.innerHTML = `
      <div><span class="num">${index + 1}</span> ${titre}</div>
      <div>${icon(step)}</div>
    `;

    list.appendChild(div);
  });
}

function renderContent(){
  const content = document.getElementById("content");

  if(!capsuleData.steps.length){
    document.getElementById("stepTitle").textContent = "";
    content.innerHTML = "<h2>Cette capsule ne contient pas encore d'élément.</h2>";
    return;
  }

  const step = capsuleData.steps[currentStep];
  document.getElementById("stepTitle").textContent = 
    step.type === "quiz" && step.quizType === "qcm" ? "QCM" : (step.title || "Étape");

  if(step.type === "image"){
    content.innerHTML = `<img src="${step.src}" alt="${step.title || "Image"}">`;
  }

  if(step.type === "video"){
    content.innerHTML = step.src ? `
      <div style="display:flex;justify-content:center;">
        <iframe 
          src="${youtubeEmbed(step.src)}"
          width="360"
          height="640"
          frameborder="0"
          allowfullscreen
          style="border-radius:24px;max-width:100%;">
        </iframe>
      </div>
    ` : "🎥 Emplacement de la vidéo";
  }

  if(step.type === "pdf"){
    if(step.loginRequired && !userIsConnected){
      content.innerHTML = `
        <div style="padding:40px;">
          <h2>🔒 PDF réservé aux élèves connectés</h2>
          <p>Connecte-toi pour voir et télécharger cette fiche.</p>
          <button class="locked" onclick="openLoginModal()">🔐 Se connecter</button>
          <br><br>
          <button class="pdf-btn" onclick="openSignupModal()">✨ Créer un compte</button>
        </div>
      `;
    } else {
      content.innerHTML = `
        <div>
          <iframe src="${step.src}" style="width:100%;height:600px;border:none;border-radius:24px;"></iframe>
          <div style="margin-top:25px;">
            <a class="pdf-btn" href="${step.src}" download>📄 Télécharger le PDF</a>
          </div>
        </div>
      `;
    }
  }

  if(step.type === "quiz"){
    renderQuizStep(step, content);
  }

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}
function quizImage(step){
  return step.image ? `
    <img src="${step.image}" alt="Image du quiz"
      style="
        width:auto !important;
        max-width:100%;
        height:auto !important;
        max-height:360px;
        object-fit:contain;
        border-radius:20px;
        margin-bottom:25px;
      ">
  ` : "";
}

function renderQuizStep(step, content){
  if(step.quizType === "qcm"){
    content.innerHTML = `
      <div class="quiz">
        ${quizImage(step)}
        <h2>${step.question || ""}</h2>

        ${(step.answers || []).map((a, index) => `
          <button onclick="checkAnswer(${index})">${a || ""}</button>
        `).join("")}

        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "trueFalse"){
    content.innerHTML = `
      <div class="quiz">
        ${quizImage(step)}
        <h2>${step.question || ""}</h2>

        <button onclick="checkTrueFalse(true)">Vrai</button>
        <button onclick="checkTrueFalse(false)">Faux</button>

        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "open"){
    content.innerHTML = `
      <div class="quiz">
        ${quizImage(step)}
        <h2>${step.question || ""}</h2>

        <textarea id="openAnswer" placeholder="Écris ta réponse ici"
          style="width:80%;min-height:140px;border-radius:18px;padding:18px;font-size:18px;"></textarea>

        <br><br>

        <button onclick="checkOpenAnswer()">Vérifier</button>

        <button onclick="showOpenCorrection()" style="margin-top:10px;background:#46395f;">
          Afficher la correction
        </button>

        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "matching"){
    content.innerHTML = `
      <div class="quiz">
        ${quizImage(step)}
        <h2>${step.question || "Associe les paires."}</h2>

        ${(step.pairs || []).map((pair, index) => `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:15px;">
            <div style="background:#46395f;border-radius:18px;padding:18px;">
              ${pair[0]}
            </div>

            <select id="match-${index}" style="border-radius:18px;padding:18px;font-size:18px;">
              <option value="">Choisir...</option>
              ${(step.pairs || []).map((p, optionIndex) => `
                <option value="${optionIndex}">${p[1]}</option>
              `).join("")}
            </select>
          </div>
        `).join("")}

        <button onclick="checkMatching()">Vérifier</button>
        <p id="feedback"></p>
      </div>
    `;
  }

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function showFeedback(ok, explanation = ""){
  const feedback = document.getElementById("feedback");

  feedback.innerHTML = `
    <div style="color:${ok ? "#5cff8d" : "#ff6b6b"};">
      ${ok ? "✅ Bonne réponse !" : "❌ Essaie encore."}
    </div>

    ${ok && explanation ? `
      <div style="margin-top:15px;color:white;">
        ${explanation}
      </div>
    ` : ""}
  `;

  feedback.style.marginTop = "25px";
  feedback.style.fontSize = "22px";
  feedback.style.fontWeight = "900";

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function checkAnswer(answerIndex){
  const step = capsuleData.steps[currentStep];
  const ok = Number(answerIndex) === Number(step.correct);

  const buttons = document.querySelectorAll(".quiz button");
  const clickedButton = buttons[answerIndex];

  if(clickedButton){
    clickedButton.style.background = ok
      ? "linear-gradient(135deg,#1fa463,#5cff8d)"
      : "linear-gradient(135deg,#b83232,#ff6b6b)";
  }

  showFeedback(ok, ok ? (step.explanation || "") : "");
}

function checkTrueFalse(value){
  const step = capsuleData.steps[currentStep];
  const ok = value === step.correct;

  const buttons = document.querySelectorAll(".quiz button");
  const trueButton = buttons[0];
  const falseButton = buttons[1];

  if(value === true && trueButton){
    trueButton.style.background = ok
      ? "linear-gradient(135deg,#1fa463,#5cff8d)"
      : "linear-gradient(135deg,#b83232,#ff6b6b)";
  }

  if(value === false && falseButton){
    falseButton.style.background = ok
      ? "linear-gradient(135deg,#1fa463,#5cff8d)"
      : "linear-gradient(135deg,#b83232,#ff6b6b)";
  }

  showFeedback(ok, step.explanation || "");
}

function checkOpenAnswer(){
  const step = capsuleData.steps[currentStep];
  const textarea = document.getElementById("openAnswer");
  const answer = textarea.value;

  const userAnswer = normalizeAnswer(answer);
  const expectedAnswer = normalizeAnswer(step.correction || "");

  const userWithoutAccents = normalizeWithoutAccents(answer);
  const expectedWithoutAccents = normalizeWithoutAccents(step.correction || "");

  if(userAnswer === expectedAnswer){
    textarea.style.border = "3px solid #5cff8d";
    textarea.style.background = "#effff4";
    showFeedback(true);
    return;
  }

  if(userWithoutAccents === expectedWithoutAccents){
    textarea.style.border = "3px solid #ff6b6b";
    textarea.style.background = "#fff2f2";

    const feedback = document.getElementById("feedback");
    feedback.innerHTML = `
      <div style="color:#ff6b6b;">
        ❌ Presque ! Il manque un accent ou un accent n'est pas au bon endroit.
      </div>
    `;
    feedback.style.marginTop = "25px";
    feedback.style.fontSize = "22px";
    feedback.style.fontWeight = "900";
    return;
  }

  textarea.style.border = "3px solid #ff6b6b";
  textarea.style.background = "#fff2f2";

  showFeedback(false);
}

function showOpenCorrection(){
  const step = capsuleData.steps[currentStep];
  const feedback = document.getElementById("feedback");

  feedback.innerHTML = `
    <div style="color:#ffe45c;">💡 Correction :</div>
    <div style="margin-top:15px;color:white;">
      ${step.correction || "Correction à compléter."}
    </div>
  `;

  feedback.style.marginTop = "25px";
  feedback.style.fontSize = "22px";
  feedback.style.fontWeight = "900";

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function checkMatching(){
  const step = capsuleData.steps[currentStep];
  let allOk = true;

  (step.pairs || []).forEach((pair, index) => {
    const select = document.getElementById("match-" + index);
    if(!select) return;

    const ok = Number(select.value) === index;

    select.style.color = "white";
    select.style.fontWeight = "900";
    select.style.border = ok ? "3px solid #5cff8d" : "3px solid #ff6b6b";
    select.style.background = ok
      ? "linear-gradient(135deg,#1fa463,#5cff8d)"
      : "linear-gradient(135deg,#b83232,#ff6b6b)";

    if(!ok) allOk = false;
  });

  showFeedback(allOk, allOk ? (step.explanation || "") : "");
}
function render(){
  renderSteps();
  renderContent();

  if(window.MathJax){
    MathJax.typesetPromise();
  }

  const percent = getTimeProgressPercent();

document.getElementById("progress").textContent = percent + " %";

const progressFill = document.getElementById("progressFill");
if(progressFill){
  progressFill.style.width = percent + "%";
}
}

async function nextStep(){
  if(currentStep < capsuleData.steps.length - 1){
    currentStep++;
    await saveProgress();
    render();
  }
}

async function previousStep(){
  if(currentStep > 0){
    currentStep--;
    await saveProgress();
    render();
  }
}

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("open");
}

  if(modal) modal.remove();
}

async function signupStudent(){
  const email = document.getElementById("signupEmail").value.trim();
  const pass = document.getElementById("signupPass").value.trim();

  if(!email || !pass){
    alert("Il faut entrer une adresse e-mail et un mot de passe.");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email: email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("🎉 Compte créé ! Vérifie maintenant tes e-mails puis confirme ton adresse.");
  closeLoginModal();
}

async function loginStudent(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  localStorage.setItem("studentConnected","true");
  alert("✅ Connexion réussie !");
  closeLoginModal();
  location.reload();
}

async function resetPassword(){
  const email = document.getElementById("loginEmail").value.trim();

  if(!email){
    alert("Écris d'abord ton adresse e-mail.");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: "https://mathsaveccecile.github.io"
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("📩 Un e-mail de réinitialisation vient d'être envoyé.");
}

async function checkConnection(){
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    userIsConnected = true;
    await loadProgress();
  }

  updateLoginDisplay();
  await renderStudentDashboard();
  render();
  
}

async function updateLoginDisplay(){
  const link = document.querySelector(".sidebar p");

  if(userIsConnected){
    link.innerHTML = `
      ✅ Élève connecté<br>
      <a href="#" onclick="logoutStudent(); return false;" style="color:white;text-decoration:underline;">
        🚪 Se déconnecter
      </a><br>

      <a href="#" onclick="restartCapsule(); return false;" style="color:white;text-decoration:underline;">
        🔄 Recommencer cette capsule
      </a>

      <div id="studentDashboard" style="margin-top:18px;font-size:16px;line-height:1.5;"></div>
    `;
  }
}

async function renderStudentDashboard(){
  const dashboard = document.getElementById("studentDashboard");
  if(!dashboard) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const { data, error } = await supabaseClient
    .from("progressions")
    .select("capsule, percent, current_step, updated_at")
    .eq("user_id", sessionData.session.user.id)
    .order("updated_at", { ascending: false });

  if(error){
    console.log(error);
    return;
  }

  if(!data || data.length === 0){
    dashboard.innerHTML = `
      <strong>👋 Bienvenue !</strong><br>
      Aucune capsule commencée pour l’instant.
    `;
    return;
  }

  const capsulesCommencees = data.length;
const capsulesTerminees = data.filter(item => Number(item.percent || 0) >= 100).length;

const derniere = data[0];

dashboard.innerHTML = `
  <strong>👋 Bonjour !</strong><br>
  📚 Capsules commencées : <strong>${capsulesCommencees}</strong><br>
  ✅ Capsules terminées : <strong>${capsulesTerminees}</strong><br>
  📖 Dernière capsule :<br>
<span style="
  color:#3da5ff;
  font-size:18px;
  font-weight:700;
  line-height:1.3;
">
${derniere.capsule}
</span>
`;
}
async function restartCapsule(){
  if(!confirm("Veux-tu vraiment recommencer cette capsule depuis le début ?")){
    return;
  }

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  await supabaseClient
  .from("progressions")
  .delete()
  .eq("user_id", sessionData.session.user.id)
  .eq("capsule", capsuleData.title);

  currentStep = 0;
  render();

  alert("La capsule a été remise à zéro !");
}

async function logoutStudent(){
  await supabaseClient.auth.signOut();
  localStorage.removeItem("studentConnected");
  alert("Tu es déconnecté.");
  location.reload();
}

function getStepDuration(step){
  if(step.type === "image") return 20;
  if(step.type === "quiz") return 60;
  if(step.type === "video") return Number(step.duration || 0);
  if(step.type === "pdf") return 0;
  return 0;
}

function getTimeProgressPercent(){
  const total = capsuleData.steps.reduce((sum, step) => sum + getStepDuration(step), 0);
  if(total === 0) return 0;

  let done = 0;

  for(let i = 0; i <= currentStep; i++){
    done += getStepDuration(capsuleData.steps[i]);
  }

  return Math.min(100, Math.round((done / total) * 100));
}
async function saveProgress(){
  if(!userIsConnected || !capsuleData.steps.length) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const percent = getTimeProgressPercent();

  const { data } = await supabaseClient
    .from("progressions")
    .select("id")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .maybeSingle();

  if(data){
    await supabaseClient
      .from("progressions")
      .update({ current_step: currentStep, percent: percent })
      .eq("id", data.id);
  }else{
    await supabaseClient
      .from("progressions")
      .insert({
        user_id: sessionData.session.user.id,
        capsule: capsuleData.title,
        current_step: currentStep,
        percent: percent
      });
  }
}

async function loadProgress(){
  if(!userIsConnected) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const { data, error } = await supabaseClient
    .from("progressions")
    .select("current_step, percent, updated_at")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .order("updated_at", { ascending: false })
    .limit(1);

  if(error){
    console.log(error);
    return;
  }

  if(data && data.length > 0){
    currentStep = Number(data[0].current_step || 0);
  }
}
</script>
