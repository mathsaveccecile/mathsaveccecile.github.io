<script>

<script>
script.onload = () => {
let currentStep = 0;

let userIsConnected = false;

function icon(type){
  if(type==="video") return "🎥";
  if(type==="image") return "🖼️";
  if(type==="pdf") return "📄";
  if(type==="quiz") return "❓";
  return "⭐";
}
function youtubeEmbed(url){
  if(!url) return "";

  if(url.includes("youtube.com/shorts/")){
    const id = url.split("/shorts/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  if(url.includes("watch?v=")){
    const id = url.split("watch?v=")[1].split("&")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  return url;
}
function formatDuration(seconds){
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;

  if(min === 0) return sec + " s";
  if(sec === 0) return min + " min";
  return min + " min " + sec + " s";
}

function getTotalDuration(){
  return capsuleData.steps.reduce((total, step) => {
    if(step.type === "pdf") return total;
    if(step.type === "image") return total + 60;
    if(step.type === "quiz") return total + 60;
    if(step.type === "video") return total + Number(step.duration || 0);
    return total;
  }, 0);
}
function updateStats(){
  const videos = capsuleData.steps.filter(s=>s.type==="video").length;
  const quiz = capsuleData.steps.filter(s=>s.type==="quiz").length;
  const pdf = capsuleData.steps.filter(s=>s.type==="pdf").length;

  document.getElementById("badges").innerHTML = `
  <span>⏱️ ${formatDuration(getTotalDuration())}</span>
  <span>🎥 ${videos} ${videos > 1 ? "vidéos" : "vidéo"}</span>
  <span>❓ ${quiz} ${quiz > 1 ? "quiz" : "quiz"}</span>
  <span>📄 ${pdf} ${pdf > 1 ? "fiches" : "fiche"}</span>
`;
}
function renderSteps(){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";

  capsuleData.steps.forEach((step,index)=>{
    const div = document.createElement("div");
    div.className = "step" + (index===currentStep ? " active" : "");
    div.onclick = async () => {
  currentStep = index;
  await saveProgress();
  render();
}
    div.innerHTML = `<div><span class="num">${index+1}</span> ${step.title}</div><div>${icon(step.type)}</div>`;
    list.appendChild(div);
  });
}

function renderContent(){
  const step = capsuleData.steps[currentStep];
  document.getElementById("stepTitle").textContent = step.title;
  const content = document.getElementById("content");

  if(step.type==="image"){
    content.innerHTML = `<img src="${step.src}" alt="${step.title}">`;
  }

  if(step.type==="video"){
  if(step.src){
    content.innerHTML = `
      <div style="display:flex;justify-content:center;">
        <iframe 
          src="${youtubeEmbed(step.src)}"
          width="360"
          height="640"
          frameborder="0"
          allowfullscreen
          style="border-radius:24px;max-width:100%;">
        </iframe>
      </div>
    `;
  } else {
    content.innerHTML = "🎥 Emplacement de la vidéo";
  }
}

  if(step.type==="pdf"){
  if(step.loginRequired && !userIsConnected){
    content.innerHTML = `
      <div style="padding:40px;">
        <h2>🔒 PDF réservé aux élèves connectés</h2>
        <p>Connecte-toi pour voir et télécharger cette fiche.</p>
        <button class="locked" onclick="openLoginModal()">🔐 Se connecter</button>
        <br><br>
<button class="pdf-btn" onclick="openSignupModal()">
  ✨ Créer un compte
</button>
      </div>
    `;
  } else {
    content.innerHTML = `
      <div>
        <iframe
  src="${youtubeEmbed(step.src)}"
  frameborder="0"
  allowfullscreen
  style="
    width:min(100%, 430px);
    aspect-ratio:9/16;
    border:none;
    border-radius:24px;
    display:block;
    margin:auto;
  ">
</iframe>

        <div style="margin-top:25px;">
          <a class="pdf-btn" href="${step.src}" download>📄 Télécharger le PDF</a>
        </div>
      </div>
    `;
  }
}

  if(step.type==="quiz"){
  if(step.quizType==="qcm"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question}</h2>
        ${step.answers.map(a=>`<button onclick="checkAnswer('${a.replaceAll("'","\\'")}')">${a}</button>`).join("")}
        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType==="vraiFaux"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question}</h2>
        <button onclick="checkAnswer('Vrai')">Vrai</button>
        <button onclick="checkAnswer('Faux')">Faux</button>
        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType==="reponseLibre"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question}</h2>
        <input id="freeAnswer" placeholder="Ta réponse">
        <button onclick="checkFreeAnswer()">Valider</button>
        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType==="paires"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question}</h2>
        ${step.pairs.map(pair=>`<p><strong>${pair[0]}</strong> → ${pair[1]}</p>`).join("")}
        <p>🔗 Version interactive à améliorer ensuite.</p>
      </div>
    `;
  }
}
}
  
function checkAnswer(answer){
  const step = capsuleData.steps[currentStep];
  document.getElementById("feedback").textContent =
    answer === step.correctAnswer ? "✅ Bonne réponse !" : "❌ Essaie encore.";
}

function checkFreeAnswer(){
  const step = capsuleData.steps[currentStep];
  const answer = document.getElementById("freeAnswer").value.trim().toLowerCase();
  const correct = step.correctAnswer.trim().toLowerCase();

  document.getElementById("feedback").textContent =
    answer === correct ? "✅ Bonne réponse !" : "❌ Essaie encore.";
}

function render(){
  renderSteps();
  renderContent();

  if(window.MathJax){
    MathJax.typesetPromise();
  }

  document.getElementById("progress").textContent =
    "Progression : " + Math.round(((currentStep+1)/capsuleData.steps.length)*100) + " %";
}

async function nextStep(){

  if(currentStep < capsuleData.steps.length-1){

    currentStep++;

    await saveProgress();

    render();

  }

}

async function previousStep(){

  if(currentStep > 0){

    currentStep--;

    await saveProgress();

    render();

  }

}

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("open");
}
const SUPABASE_URL = "https://cxzxbvjtkuzfubnsnfhs.supabase.co";
const SUPABASE_KEY = "sb_publishable_eVNeYcTQgFYZ_8t2pHyQ4Q_93ZCmoU1";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function openLoginModal(){
  document.body.insertAdjacentHTML("beforeend", `
    <div id="loginModal" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;">
      <div style="background:#261e38;padding:35px;border-radius:25px;width:360px;max-width:90%;">
        <h2>Connexion élève</h2>
        <p>Connecte-toi pour garder ta progression et télécharger les fiches.</p>

        <input id="loginEmail" placeholder="Adresse e-mail" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">
        <input id="loginPass" type="password" placeholder="Mot de passe" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">

        <button onclick="loginStudent()" style="width:100%;margin-top:15px;">Se connecter</button>
       <button onclick="resetPassword()" style="width:100%;margin-top:12px;">
  🔑 Mot de passe oublié
</button>
        <button onclick="openSignupModal()" style="width:100%;margin-top:12px;">✨ Créer un compte</button>
        <button class="locked" onclick="closeLoginModal()" style="width:100%;margin-top:12px;">Annuler</button>
      </div>
    </div>
  `);
}

function openSignupModal(){
  closeLoginModal();

  document.body.insertAdjacentHTML("beforeend", `
    <div id="loginModal" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;">
      <div style="background:#261e38;padding:35px;border-radius:25px;width:360px;max-width:90%;">
        <h2>Créer un compte élève</h2>
        <p>Crée ton compte pour retrouver ta progression plus tard.</p>

        <input id="signupEmail" placeholder="Adresse e-mail" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">
        <input id="signupPass" type="password" placeholder="Mot de passe" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">

        <button onclick="signupStudent()" style="width:100%;margin-top:15px;">Créer mon compte</button>
        <button class="locked" onclick="closeLoginModal()" style="width:100%;margin-top:12px;">Annuler</button>
      </div>
    </div>
  `);
}

function closeLoginModal(){
  const modal = document.getElementById("loginModal");
  if(modal) modal.remove();
}

async function signupStudent(){

    const email = document.getElementById("signupEmail").value.trim();
    const pass = document.getElementById("signupPass").value.trim();

    if(!email || !pass){
        alert("Il faut entrer une adresse e-mail et un mot de passe.");
        return;
    }

    const { error } = await supabaseClient.auth.signUp({
        email: email,
        password: pass
    });

    if(error){
        alert(error.message);
        return;
    }

    alert("🎉 Compte créé ! Vérifie maintenant tes e-mails puis confirme ton adresse.");

    closeLoginModal();
}

async function loginStudent(){

    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPass").value.trim();

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: pass
    });

    if(error){
        alert(error.message);
        return;
    }

    localStorage.setItem("studentConnected","true");

    alert("✅ Connexion réussie !");

    closeLoginModal();

    location.reload();
}

async function resetPassword(){
  const email = document.getElementById("loginEmail").value.trim();

  if(!email){
    alert("Écris d'abord ton adresse e-mail.");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: "https://mathsaveccecile.github.io"
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("📩 Un e-mail de réinitialisation vient d'être envoyé.");
}
document.getElementById("title").textContent = capsuleData.title;
document.getElementById("topTitle").textContent = capsuleData.title + " - " + capsuleData.levels;
async function checkConnection(){
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    userIsConnected = true;
    await loadProgress();
  }

  updateLoginDisplay();
  render();
}
function updateLoginDisplay(){
  const link = document.querySelector(".sidebar p");

  if(userIsConnected){
    link.innerHTML = `
      ✅ Élève connecté<br>
      <a href="#" onclick="logoutStudent(); return false;"
         style="color:white;text-decoration:underline;font-weight:bold;">
        🚪 Se déconnecter
      </a>
    `;
  }
}

(async () => {
    updateStats();
    await checkConnection();
})();

async function logoutStudent(){
  await supabaseClient.auth.signOut();
  localStorage.removeItem("studentConnected");
  alert("Tu es déconnecté.");
  location.reload();
}
async function saveProgress(){

  if(!userIsConnected) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();

  if(!sessionData.session) return;

  const percent = Math.round(((currentStep + 1) / capsuleData.steps.length) * 100);

  const { data } = await supabaseClient
    .from("progressions")
    .select("id")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .maybeSingle();

  if(data){

    await supabaseClient
      .from("progressions")
      .update({
        current_step: currentStep,
        percent: percent
      })

      .eq("id", data.id);

  }else{

    await supabaseClient
      .from("progressions")
      .insert({
        user_id: sessionData.session.user.id,
        capsule: capsuleData.title,
        current_step: currentStep,
        percent: percent
      });

  }

}
async function loadProgress(){
  console.log("LOAD PROGRESS");

  if(!userIsConnected) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();

  if(!sessionData.session) return;

  const { data, error } = await supabaseClient
    .from("progressions")
    .select("current_step, percent, updated_at")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .order("updated_at", { ascending: false })
    .limit(1);

  if(error){
    console.log(error);
    return;
  }

  if(data && data.length > 0){
    currentStep = data[0].current_step;
    currentStep = data[0].current_step;
console.log(currentStep);
  }
}
}
</script>
