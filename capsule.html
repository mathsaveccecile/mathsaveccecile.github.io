<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Maths avec Cécile</title>
<link rel="icon" type="image/png" href="avatar-cecile.png">

<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body{margin:0;background:#120d22;color:white;font-family:Arial,sans-serif}
header{display:none}
.page{display:grid;grid-template-columns:330px 1fr;min-height:100vh}
.sidebar{background:#171124;padding:25px;border-right:1px solid #33284a}
.sidebar h1{font-size:32px;line-height:1.15;margin:0 0 20px}
.badges{margin:15px 0}
.badges span{display:inline-block;background:#4b435b;padding:10px 15px;border-radius:20px;margin:5px;font-weight:900;font-size:15px;color:white}
.step{background:#2b243b;margin:12px 0;padding:16px;border-radius:15px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;font-weight:800}
.step.active{background:#1e5c49}
.num{color:#ffe45c;font-weight:900;margin-right:12px}
.main{padding:45px}
.top-links{display:flex;gap:14px;margin-bottom:18px}
.top-links a{color:white;font-weight:900;text-decoration:none}
.card{max-width:900px;margin:auto;background:#261e38;border-radius:28px;padding:35px}
.content{background:#352d49;border-radius:20px;padding:30px;text-align:center;min-height:320px}
.content img{width:min(900px,100%);height:auto;border-radius:20px}
.btns{display:flex;justify-content:space-between;margin-top:30px}
button,.pdf-btn{border:none;border-radius:999px;padding:18px 35px;font-size:20px;font-weight:900;color:white;background:linear-gradient(135deg,#ff4fa3,#3058ff);cursor:pointer;text-decoration:none}
.locked{background:#555;cursor:not-allowed}
.quiz button{display:block;margin:12px auto;background:#46395f;width:80%}
#menuMobileBtn{display:none}

@media (max-width:800px){
  header{position:sticky;top:0;z-index:1000;display:flex;justify-content:flex-end;background:#211933;padding:12px}
  #menuMobileBtn{display:block;font-size:18px;padding:12px 18px}
  .page{display:block}
  .sidebar{display:none;position:fixed;top:70px;left:12px;right:12px;z-index:999;border-radius:20px;max-height:75vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .sidebar.open{display:block}
  .main{padding:12px}
  .card{padding:18px;border-radius:22px}
  .content{padding:14px}
  .btns button{font-size:16px;padding:14px 22px}
}
</style>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)'], ['$', '$']],
    displayMath: [['\\[', '\\]'], ['$$', '$$']]
  }
};
</script>

<script
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
  async>
</script>
</head>

<body>

<header>
  <button id="menuMobileBtn" onclick="toggleMenu()">☰ Menu</button>
</header>

<div class="page">
  <aside class="sidebar">
    <h1 id="title">Chargement...</h1>

    <div class="badges" id="badges"></div>

    <p>
      <a href="#" onclick="openLoginModal(); return false;" style="color:white;text-decoration:underline;font-weight:bold;cursor:pointer;">
        🔐 Connecte-toi pour retrouver ta progression plus tard.
      </a>
    </p>

    <h3 id="progress">Progression : 0 %</h3>
    <div id="stepsList"></div>
  </aside>

  <main class="main">
    <div class="top-links">
      <a id="avisLink" href="avis.html">⭐ Avis</a>
      <a id="backLink" href="index.html">← Retour au niveau</a>
    </div>

    <div class="card">
      <h1 id="stepTitle"></h1>
      <div class="content" id="content">Chargement de la capsule...</div>
      <div class="btns">
        <button onclick="previousStep()">← Précédent</button>
        <button onclick="nextStep()">Suivant →</button>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/quiz-engine.js"></script>

<script>
const params = new URLSearchParams(location.search);
const dataFile = params.get("data");

let currentStep = 0;
let userIsConnected = false;

if(!dataFile){
  document.getElementById("content").innerHTML = "<h2>❌ Aucune capsule indiquée.</h2>";
}else{
  const script = document.createElement("script");
  script.src = dataFile + "?v=" + Date.now();
  script.onload = startCapsule;
  script.onerror = () => {
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger le fichier de la capsule.</h2>";
  };
  document.head.appendChild(script);
}

function startCapsule(){
  if(typeof capsuleData === "undefined"){
    document.getElementById("content").innerHTML = "<h2>❌ Impossible de charger la capsule.</h2>";
    return;
  }

  if(!Array.isArray(capsuleData.levels)){
    capsuleData.levels = capsuleData.level ? [capsuleData.level] : [];
  }

  if(!Array.isArray(capsuleData.steps)){
    capsuleData.steps = [];
  }

  document.title = capsuleData.title + " - Maths avec Cécile";
  document.getElementById("title").textContent = capsuleData.title;

  document.getElementById("avisLink").href =
    "avis.html?capsule=" + encodeURIComponent(capsuleData.title);

  document.getElementById("backLink").href =
    capsuleData.levels.length ? capsuleData.levels[0] + ".html" : "index.html";

  updateStats();
  checkConnection();
}

function icon(type){
  if(type==="video") return "🎥";
  if(type==="image") return "🖼️";
  if(type==="pdf") return "📄";
  if(type==="quiz") return "❓";
  return "⭐";
}

function youtubeEmbed(url){
  if(!url) return "";

  if(url.includes("youtube.com/shorts/")){
    const id = url.split("/shorts/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  if(url.includes("youtu.be/")){
    const id = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  if(url.includes("watch?v=")){
    const id = url.split("watch?v=")[1].split("&")[0];
    return "https://www.youtube.com/embed/" + id;
  }

  return url;
}

function formatDuration(seconds){
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;

  if(seconds === 0) return "0 min";
  if(min === 0) return sec + " s";
  if(sec === 0) return min + " min";
  return min + " min " + sec + " s";
}

function getTotalDuration(){
  return capsuleData.steps.reduce((total, step) => {
    if(step.type === "pdf") return total;
    if(step.type === "image") return total + 60;
    if(step.type === "quiz") return total + 60;
    if(step.type === "video") return total + Number(step.duration || 0);
    return total;
  }, 0);
}

function updateStats(){
  const videos = capsuleData.steps.filter(s => s.type === "video").length;
  const images = capsuleData.steps.filter(s => s.type === "image").length;
  const quiz = capsuleData.steps.filter(s => s.type === "quiz").length;
  const pdf = capsuleData.steps.filter(s => s.type === "pdf").length;

  document.getElementById("badges").innerHTML = `
    <span>⏱️ ${formatDuration(getTotalDuration())}</span>
    <span>🎥 ${videos} ${videos > 1 ? "vidéos" : "vidéo"}</span>
    <span>🖼️ ${images} ${images > 1 ? "images" : "image"}</span>
    <span>❓ ${quiz} quiz</span>
    <span>📄 ${pdf} ${pdf > 1 ? "fiches" : "fiche"}</span>
  `;
}

function renderSteps(){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";

  capsuleData.steps.forEach((step,index)=>{
    const div = document.createElement("div");
    div.className = "step" + (index === currentStep ? " active" : "");

    div.onclick = async () => {
      currentStep = index;
      await saveProgress();
      render();
    };

    div.innerHTML = `
      <div><span class="num">${index + 1}</span> ${step.title || "Étape"}</div>
      <div>${icon(step.type)}</div>
    `;

    list.appendChild(div);
  });
}

function renderContent(){
  const content = document.getElementById("content");

  if(!capsuleData.steps.length){
    document.getElementById("stepTitle").textContent = "";
    content.innerHTML = "<h2>Cette capsule ne contient pas encore d'élément.</h2>";
    return;
  }

  const step = capsuleData.steps[currentStep];
  document.getElementById("stepTitle").textContent = step.title || "Étape";

  if(step.type === "image"){
    content.innerHTML = `<img src="${step.src}" alt="${step.title || "Image"}">`;
  }
if(window.MathJax){
    MathJax.typesetPromise();
}
  if(step.type === "video"){
    content.innerHTML = step.src ? `
      <div style="display:flex;justify-content:center;">
        <iframe 
          src="${youtubeEmbed(step.src)}"
          width="360"
          height="640"
          frameborder="0"
          allowfullscreen
          style="border-radius:24px;max-width:100%;">
        </iframe>
      </div>
    ` : "🎥 Emplacement de la vidéo";
  }

  if(step.type === "pdf"){
    if(step.loginRequired && !userIsConnected){
      content.innerHTML = `
        <div style="padding:40px;">
          <h2>🔒 PDF réservé aux élèves connectés</h2>
          <p>Connecte-toi pour voir et télécharger cette fiche.</p>
          <button class="locked" onclick="openLoginModal()">🔐 Se connecter</button>
          <br><br>
          <button class="pdf-btn" onclick="openSignupModal()">✨ Créer un compte</button>
        </div>
      `;
    } else {
      content.innerHTML = `
        <div>
          <iframe src="${step.src}" style="width:100%;height:600px;border:none;border-radius:24px;"></iframe>
          <div style="margin-top:25px;">
            <a class="pdf-btn" href="${step.src}" download>📄 Télécharger le PDF</a>
          </div>
        </div>
      `;
    }
  }

  if(step.type === "quiz"){
    renderQuizStep(step, content);
  }
}

function renderQuizStep(step, content){
  if(step.quizType === "qcm"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question || ""}</h2>

        ${(step.answers || []).map((a, index) => `
          <button onclick="checkAnswer(${index})">${a || ""}</button>
        `).join("")}

        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "trueFalse"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question || ""}</h2>
        <button onclick="checkTrueFalse(true)">Vrai</button>
        <button onclick="checkTrueFalse(false)">Faux</button>
        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "open"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question || ""}</h2>

        <textarea id="openAnswer" placeholder="Écris ta réponse ici"
          style="width:80%;min-height:140px;border-radius:18px;padding:18px;font-size:18px;"></textarea>

        <br><br>
        <button onclick="checkOpenAnswer()">Voir la correction</button>

        <p id="feedback"></p>
      </div>
    `;
  }

  if(step.quizType === "matching"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question || "Associe les paires."}</h2>

        ${(step.pairs || []).map((pair, index) => `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:15px;">
            <div style="background:#46395f;border-radius:18px;padding:18px;">${pair[0]}</div>
            <select id="match-${index}" style="border-radius:18px;padding:18px;font-size:18px;">
              <option value="">Choisir...</option>
              ${(step.pairs || []).map(p => `<option value="${p[1]}">${p[1]}</option>`).join("")}
            </select>
          </div>
        `).join("")}

        <button onclick="checkMatching()">Vérifier</button>
        <p id="feedback"></p>
      </div>
    `;
  }

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function showFeedback(ok, explanation = ""){
  const feedback = document.getElementById("feedback");

  feedback.innerHTML = `
    <div style="color:${ok ? "#5cff8d" : "#ff6b6b"};">
      ${ok ? "✅ Bonne réponse !" : "❌ Essaie encore."}
    </div>
    ${explanation ? `<div style="margin-top:15px;color:white;">${explanation}</div>` : ""}
  `;

  feedback.style.marginTop = "25px";
  feedback.style.fontSize = "22px";
  feedback.style.fontWeight = "900";

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function checkAnswer(answerIndex){
  const step = capsuleData.steps[currentStep];
  showFeedback(Number(answerIndex) === Number(step.correct), step.explanation);
}

function checkTrueFalse(value){
  const step = capsuleData.steps[currentStep];
  showFeedback(value === step.correct, step.explanation);
}

function checkOpenAnswer(){
  const step = capsuleData.steps[currentStep];

  const feedback = document.getElementById("feedback");
  feedback.innerHTML = `
    <div style="color:#ffe45c;">💡 Correction proposée :</div>
    <div style="margin-top:15px;color:white;">
      ${step.correction || step.explanation || "Correction à compléter."}
    </div>
  `;

  feedback.style.marginTop = "25px";
  feedback.style.fontSize = "22px";
  feedback.style.fontWeight = "900";

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function checkMatching(){
  const step = capsuleData.steps[currentStep];

  const ok = (step.pairs || []).every((pair, index) => {
    const select = document.getElementById("match-" + index);
    return select && select.value === pair[1];
  });

  showFeedback(ok, step.explanation);
}

function checkAnswer(answerIndex){
  const step = capsuleData.steps[currentStep];
  const feedback = document.getElementById("feedback");

  if (Number(answerIndex) === Number(step.correct)) {
    feedback.innerHTML = `
      <div style="color:#5cff8d;">✅ Bonne réponse !</div>
      ${step.explanation ? `<div style="margin-top:15px;color:white;">${step.explanation}</div>` : ""}
    `;
  } else {
    feedback.innerHTML = `
      <div style="color:#ff6b6b;">❌ Essaie encore.</div>
      ${step.explanation ? `<div style="margin-top:15px;color:white;">${step.explanation}</div>` : ""}
    `;
  }

  feedback.style.marginTop = "25px";
  feedback.style.fontSize = "22px";
  feedback.style.fontWeight = "900";

  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function checkFreeAnswer(){
  const step = capsuleData.steps[currentStep];
  const answer = document.getElementById("freeAnswer").value.trim().toLowerCase();
  const correct = String(step.correctAnswer || "").trim().toLowerCase();

  document.getElementById("feedback").textContent =
    answer === correct ? "✅ Bonne réponse !" : "❌ Essaie encore.";
}


function render(){
  renderSteps();
  renderContent();

  if(window.MathJax){
    MathJax.typesetPromise();
  }

  const percent = capsuleData.steps.length
    ? Math.round(((currentStep + 1) / capsuleData.steps.length) * 100)
    : 0;

  document.getElementById("progress").textContent =
    "Progression : " + percent + " %";
}

async function nextStep(){
  if(currentStep < capsuleData.steps.length - 1){
    currentStep++;
    await saveProgress();
    render();
  }
}

async function previousStep(){
  if(currentStep > 0){
    currentStep--;
    await saveProgress();
    render();
  }
}

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("open");
}

const SUPABASE_URL = "https://cxzxbvjtkuzfubnsnfhs.supabase.co";
const SUPABASE_KEY = "sb_publishable_eVNeYcTQgFYZ_8t2pHyQ4Q_93ZCmoU1";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function openLoginModal(){
  document.body.insertAdjacentHTML("beforeend", `
    <div id="loginModal" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;">
      <div style="background:#261e38;padding:35px;border-radius:25px;width:360px;max-width:90%;">
        <h2>Connexion élève</h2>
        <p>Connecte-toi pour garder ta progression et télécharger les fiches.</p>

        <input id="loginEmail" placeholder="Adresse e-mail" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">
        <input id="loginPass" type="password" placeholder="Mot de passe" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">

        <button onclick="loginStudent()" style="width:100%;margin-top:15px;">Se connecter</button>
        <button onclick="resetPassword()" style="width:100%;margin-top:12px;">🔑 Mot de passe oublié</button>
        <button onclick="openSignupModal()" style="width:100%;margin-top:12px;">✨ Créer un compte</button>
        <button class="locked" onclick="closeLoginModal()" style="width:100%;margin-top:12px;">Annuler</button>
      </div>
    </div>
  `);
}

function openSignupModal(){
  closeLoginModal();

  document.body.insertAdjacentHTML("beforeend", `
    <div id="loginModal" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;">
      <div style="background:#261e38;padding:35px;border-radius:25px;width:360px;max-width:90%;">
        <h2>Créer un compte élève</h2>
        <p>Crée ton compte pour retrouver ta progression plus tard.</p>

        <input id="signupEmail" placeholder="Adresse e-mail" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">
        <input id="signupPass" type="password" placeholder="Mot de passe" style="width:100%;padding:15px;margin:8px 0;border-radius:12px;border:none;">

        <button onclick="signupStudent()" style="width:100%;margin-top:15px;">Créer mon compte</button>
        <button class="locked" onclick="closeLoginModal()" style="width:100%;margin-top:12px;">Annuler</button>
      </div>
    </div>
  `);
}

function closeLoginModal(){
  const modal = document.getElementById("loginModal");
  if(modal) modal.remove();
}

async function signupStudent(){
  const email = document.getElementById("signupEmail").value.trim();
  const pass = document.getElementById("signupPass").value.trim();

  if(!email || !pass){
    alert("Il faut entrer une adresse e-mail et un mot de passe.");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email: email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("🎉 Compte créé ! Vérifie maintenant tes e-mails puis confirme ton adresse.");
  closeLoginModal();
}

async function loginStudent(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  localStorage.setItem("studentConnected","true");
  alert("✅ Connexion réussie !");
  closeLoginModal();
  location.reload();
}

async function resetPassword(){
  const email = document.getElementById("loginEmail").value.trim();

  if(!email){
    alert("Écris d'abord ton adresse e-mail.");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: "https://mathsaveccecile.github.io"
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("📩 Un e-mail de réinitialisation vient d'être envoyé.");
}

async function checkConnection(){
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    userIsConnected = true;
    await loadProgress();
  }

  updateLoginDisplay();
  render();
}

function updateLoginDisplay(){
  const link = document.querySelector(".sidebar p");

  if(userIsConnected){
    link.innerHTML = `
      ✅ Élève connecté<br>
      <a href="#" onclick="logoutStudent(); return false;" style="color:white;text-decoration:underline;font-weight:bold;">
        🚪 Se déconnecter
      </a>
    `;
  }
}

async function logoutStudent(){
  await supabaseClient.auth.signOut();
  localStorage.removeItem("studentConnected");
  alert("Tu es déconnecté.");
  location.reload();
}

async function saveProgress(){
  if(!userIsConnected || !capsuleData.steps.length) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const percent = Math.round(((currentStep + 1) / capsuleData.steps.length) * 100);

  const { data } = await supabaseClient
    .from("progressions")
    .select("id")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .maybeSingle();

  if(data){
    await supabaseClient
      .from("progressions")
      .update({ current_step: currentStep, percent: percent })
      .eq("id", data.id);
  }else{
    await supabaseClient
      .from("progressions")
      .insert({
        user_id: sessionData.session.user.id,
        capsule: capsuleData.title,
        current_step: currentStep,
        percent: percent
      });
  }
}

async function loadProgress(){
  if(!userIsConnected) return;

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session) return;

  const { data, error } = await supabaseClient
    .from("progressions")
    .select("current_step, percent, updated_at")
    .eq("user_id", sessionData.session.user.id)
    .eq("capsule", capsuleData.title)
    .order("updated_at", { ascending: false })
    .limit(1);

  if(error){
    console.log(error);
    return;
  }

  if(data && data.length > 0){
    currentStep = Number(data[0].current_step || 0);
  }
}
</script>

</body>
</html>
