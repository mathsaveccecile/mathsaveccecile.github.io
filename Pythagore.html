<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pythagore - Maths avec Cécile</title>
<link rel="stylesheet" href="">
<style>
body{margin:0;background:#120d22;color:white;font-family:Arial,sans-serif}
header{background:#211933;padding:22px;font-size:28px;font-weight:900}
.page{display:grid;grid-template-columns:330px 1fr;min-height:100vh}
.sidebar{background:#171124;padding:25px;border-right:1px solid #33284a}
.badges span{display:inline-block;background:#4b435b;padding:10px 15px;border-radius:20px;margin:5px;font-weight:bold}
.step{background:#2b243b;margin:12px 0;padding:18px;border-radius:15px;cursor:pointer;display:flex;justify-content:space-between}
.step.active{background:#1e5c49}
.num{color:#ffe45c;font-weight:900;margin-right:12px}
.main{padding:45px}
.card{max-width:900px;margin:auto;background:#261e38;border-radius:28px;padding:35px}
.content{background:#352d49;border-radius:20px;padding:30px;text-align:center;min-height:320px}
.content img{max-width:90%;max-height:420px;border-radius:20px}
.btns{display:flex;justify-content:space-between;margin-top:30px}
button,.pdf-btn{border:none;border-radius:999px;padding:18px 35px;font-size:20px;font-weight:900;color:white;background:linear-gradient(135deg,#ff4fa3,#3058ff);cursor:pointer;text-decoration:none}
.locked{background:#555;cursor:not-allowed}
.quiz button{display:block;margin:12px auto;background:#46395f;width:80%}
</style>
</head>

<body>

<header id="topTitle">Pythagore - 4e / 3e</header>

<div class="page">
  <aside class="sidebar">
    <h1 id="title">Pythagore</h1>
    <div class="badges" id="badges"></div>
    <p>🔐 Connecte-toi pour retrouver ta progression plus tard.</p>
    <h3 id="progress">Progression : 0 %</h3>
    <div id="stepsList"></div>
  </aside>

  <main class="main">
    <a href="4e.html" style="color:white;font-weight:bold;text-decoration:none">← Retour au niveau</a>
    <div class="card">
      <h1 id="stepTitle"></h1>
      <div class="content" id="content"></div>
      <div class="btns">
        <button onclick="previousStep()">← Précédent</button>
        <button onclick="nextStep()">Suivant →</button>
      </div>
    </div>
  </main>
</div>

<script src="pythagore-data.js"></script>

<script>
let currentStep = 0;
const userIsConnected = false;

function icon(type){
  if(type==="video") return "🎥";
  if(type==="image") return "🖼️";
  if(type==="pdf") return "📄";
  if(type==="quiz") return "❓";
  return "⭐";
}

function updateStats(){
  const videos = capsuleData.steps.filter(s=>s.type==="video").length;
  const quiz = capsuleData.steps.filter(s=>s.type==="quiz").length;
  const pdf = capsuleData.steps.filter(s=>s.type==="pdf").length;

  document.getElementById("badges").innerHTML = `
    <span>⏱️ ${capsuleData.duration}</span>
    <span>🎥 ${videos} vidéos</span>
    <span>❓ ${quiz} quiz</span>
    <span>📄 ${pdf} fiches</span>
  `;
}

function renderSteps(){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";

  capsuleData.steps.forEach((step,index)=>{
    const div = document.createElement("div");
    div.className = "step" + (index===currentStep ? " active" : "");
    div.onclick = () => {currentStep=index; render();}
    div.innerHTML = `<div><span class="num">${index+1}</span> ${step.title}</div><div>${icon(step.type)}</div>`;
    list.appendChild(div);
  });
}

function renderContent(){
  const step = capsuleData.steps[currentStep];
  document.getElementById("stepTitle").textContent = step.title;
  const content = document.getElementById("content");

  if(step.type==="image"){
    content.innerHTML = `<img src="${step.src}" alt="${step.title}">`;
  }

  if(step.type==="video"){
    if(step.src){
      content.innerHTML = `<iframe width="100%" height="420" src="${step.src}" frameborder="0" allowfullscreen></iframe>`;
    } else {
      content.innerHTML = "🎥 Emplacement de la vidéo";
    }
  }

  if(step.type==="pdf"){
  content.innerHTML = `
    <div>
      <iframe 
        src="${step.src}" 
        width="100%" 
        height="500px" 
        style="border:none;border-radius:18px;background:white;">
      </iframe>

      <div style="margin-top:25px;">
        ${
          step.loginRequired && !userIsConnected
          ? `<button class="locked">🔒 Connecte-toi pour télécharger le PDF</button>`
          : `<a class="pdf-btn" href="${step.src}" download>📄 Télécharger le PDF</a>`
        }
      </div>
    </div>
  `;
}

  if(step.type==="quiz"){
    content.innerHTML = `
      <div class="quiz">
        <h2>${step.question}</h2>
        ${step.answers.map(a=>`<button onclick="checkAnswer('${a.replaceAll("'","\\'")}')">${a}</button>`).join("")}
        <p id="feedback"></p>
      </div>
    `;
  }
}

function checkAnswer(answer){
  const step = capsuleData.steps[currentStep];
  document.getElementById("feedback").textContent =
    answer === step.correctAnswer ? "✅ Bonne réponse !" : "❌ Essaie encore.";
}

function render(){
  renderSteps();
  renderContent();
  document.getElementById("progress").textContent =
    "Progression : " + Math.round(((currentStep+1)/capsuleData.steps.length)*100) + " %";
}

function nextStep(){
  if(currentStep < capsuleData.steps.length-1){currentStep++; render();}
}

function previousStep(){
  if(currentStep > 0){currentStep--; render();}
}

document.getElementById("title").textContent = capsuleData.title;
document.getElementById("topTitle").textContent = capsuleData.title + " - " + capsuleData.levels;
updateStats();
render();
</script>

</body>
</html>
