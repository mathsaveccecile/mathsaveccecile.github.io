<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths avec Cécile</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#dff0d8;
    text-align:center;
}

header{
    background:white;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    color:#2833c5;
    font-size:48px;
    font-style:italic;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:40px;
    margin:60px;
}

.card{
    width:220px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

.top{
    color:white;
    padding:25px;
    font-size:50px;
    font-weight:bold;
}

.purple{background:#b89cff;}
.blue{background:#8ec8ff;}
.turquoise{background:#53d6d2;}
.green{background:#186d68;}

button{
    margin:25px;
    padding:15px 35px;
    border:none;
    border-radius:15px;
    background:#4b7cff;
    color:white;
    font-size:22px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>🚀 Choisis ton niveau</h1>
</header>

<div class="container">

<div class="card">
<div class="top purple">6e</div>
<button>Entrer</button>
</div>

<div class="card">
<div class="top blue">5e</div>
<button>Entrer</button>
</div>

<div class="card">
<div class="top turquoise">4e</div>
<button>Entrer</button>
</div>

<div class="card">
<div class="top green">3e</div>
<button>Entrer</button>
</div>

</div>

</body>
</html>
