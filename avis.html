<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commentaires - Maths avec Cécile</title>
<link rel="icon" type="image/png" href="avatar-cecile.png">

<style>
body{margin:0;background:#120d22;color:white;font-family:Arial,sans-serif}
main{max-width:900px;margin:40px auto;background:#261e38;border-radius:28px;padding:35px}
input,textarea,select{width:100%;padding:15px;margin:10px 0;border-radius:12px;border:none;font-size:16px}
button{border:none;border-radius:999px;padding:16px 30px;font-size:18px;font-weight:900;color:white;background:linear-gradient(135deg,#ff4fa3,#3058ff);cursor:pointer}
.card{background:#352d49;border-radius:20px;padding:20px;margin:18px 0}
.reply{background:#241d36;border-left:5px solid #ff4fa3;border-radius:16px;padding:16px;margin-top:18px}
a{color:white;font-weight:bold}
</style>
</head>

<body>

<main>
<a href="index.html">← Retour à l'accueil</a>

<h1>Commentaires et questions publiés sur cette capsule</h1>
<div id="reviewsList">Chargement...</div>

<h2>Laisse un commentaire ou pose une question</h2>
<p>Ton commentaire ou ta question sera publié(e) seulement après validation par Cécile.</p>

<div id="formAvis">
  <input id="pseudo" placeholder="Ton pseudo" maxlength="30">
  <input id="capsule" placeholder="Nom de la capsule concernée" readonly>

  <textarea id="message" rows="5" placeholder="Écris ton commentaire ou ta question ici..."></textarea>

  <button onclick="sendReview()">📨 Envoyer mon commentaire ou ma question</button>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://cxzxbvjtkuzfubnsnfhs.supabase.co";
const SUPABASE_KEY = "sb_publishable_eVNeYcTQgFYZ_8t2pHyQ4Q_93ZCmoU1";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadReviews(){
  const { data, error } = await supabaseClient
    .from("reviews")
    .select("rating, message, pseudo, capsule, created_at, admin_reply")
    .eq("published", true)
    .order("created_at", { ascending: false });

  const list = document.getElementById("reviewsList");

  if(error){
    list.innerHTML = "Impossible de charger les commentaires.";
    return;
  }

  if(!data || data.length === 0){
    list.innerHTML = "<p>Aucun commentaire ou aucune question pour le moment.</p>";
    return;
  }

  list.innerHTML = data.map(review => {
    const date = new Date(review.created_at);
    const dateFr = date.toLocaleDateString("fr-FR", {
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    return `
      <div class="card">
        <h2 style="font-size:30px;margin-bottom:10px;">
          ${"⭐".repeat(review.rating)}
        </h2>

        <p><strong>👤 ${review.pseudo || "Élève"}</strong></p>
        <p><strong>📚 ${review.capsule || "Capsule non précisée"}</strong></p>

        <p style="color:#cfcfcf;font-size:14px;">
          📅 Publié le ${dateFr}
        </p>

        <p style="margin-top:18px;font-size:18px;line-height:1.6;">
          ${review.message}
        </p>

        ${review.admin_reply ? `
          <div class="reply">
            <strong>👩‍🏫 Réponse de Cécile :</strong>
            <p style="font-size:17px;line-height:1.6;margin-bottom:0;">
              ${review.admin_reply}
            </p>
          </div>
        ` : ""}
      </div>
    `;
  }).join("");
}

async function sendReview(){
  const pseudo = document.getElementById("pseudo").value.trim();
  const capsule = document.getElementById("capsule").value.trim();
  const rating = Number(document.getElementById("rating").value);
  const message = document.getElementById("message").value.trim();

  if(!message){
    alert("Écris un commentaire avant d'envoyer.");
    return;
  }

  const { data: sessionData } = await supabaseClient.auth.getSession();

  if(!sessionData.session){
    alert("Tu dois être connecté pour laisser un commentaire.");
    return;
  }

  const user = sessionData.session.user;

  const { error } = await supabaseClient
    .from("reviews")
    .insert({
      user_id: user.id,
      email: user.email,
      pseudo: pseudo,
      capsule: capsule,
      rating: rating,
      message: message,
      published: false,
      admin_reply: ""
    });

  if(error){
    alert(error.message);
    return;
  }

  alert("✅ Merci ! Ton commentaire est envoyé et sera publié après validation.");
  document.getElementById("message").value = "";
}

loadReviews();

const params = new URLSearchParams(window.location.search);
const capsule = params.get("capsule");

if(capsule){
  document.getElementById("capsule").value = decodeURIComponent(capsule);
}
</script>

</body>
</html>
